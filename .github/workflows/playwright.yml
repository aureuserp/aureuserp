name: Playwright Tests

on:
  push: {}
  pull_request: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aureus
        ports:
          - 3306
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, xml, pdo_mysql, gd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache composer vendor directory
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-vendor-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-vendor-

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-cache-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-cache-

      - name: Create .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Update .env file
        run: |
          # Make replacements robust: handle optional leading '#' and optional spaces
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/^#DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^#DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^#DB_DATABASE=.*/DB_DATABASE=aureus/' .env
          sed -i 's/^#DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^#DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader --no-scripts

      - name: Wait for MySQL to be ready
        run: |
          HOST=127.0.0.1
          PORT=${{ job.services.mysql.ports['3306'] }}
          echo "Waiting for MySQL at ${HOST}:${PORT} (up to 120s)"
          for i in {1..120}; do
            if mysqladmin ping -h${HOST} -P${PORT} -uroot -proot >/dev/null 2>&1; then
              echo "MySQL is up"
              sleep 2
              break
            fi
            echo "MySQL not ready yet (attempt ${i})"
            sleep 1
          done
          mysqladmin version -h${HOST} -P${PORT} -uroot -proot || true

      - name: Run Composer autoload and Laravel package discovery (after DB ready)
        run: |
          # avoid triggering composer scripts (which call artisan package:discover) before DB is ready
          composer dump-autoload -o --no-scripts
          php artisan package:discover --ansi

      - name: Run ERP installer (non-interactive via secrets)
        env:
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          # Use provided secrets or fallbacks (bash parameter expansion)
          NAME="${ADMIN_NAME:-Example}"
          EMAIL="${ADMIN_EMAIL:-admin@example.com}"
          PASSWORD="${ADMIN_PASSWORD:-admin123}"

          php artisan erp:install --no-interaction \
            --admin-name="${NAME}" \
            --admin-email="${EMAIL}" \
            --admin-password="${PASSWORD}"

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build --if-present

      - name: Start Laravel dev server
        run: |
          nohup php artisan serve --host=127.0.0.1 --port=8000 >/tmp/laravel.log 2>&1 &
          echo $! > /tmp/artisan.pid

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl --fail http://127.0.0.1:8000 >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

      - name: Install Playwright Browsers
        run: |
          sudo apt-get update --allow-releaseinfo-change
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: http://127.0.0.1:8000
        run: |
          npx playwright test --config=tests/e2e-pw/playwright.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e-pw/playwright-report
            tests/e2e-pw/test-results
          if-no-files-found: ignore
