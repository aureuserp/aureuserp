name: Playwright Tests

on: [push, pull_request]

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  aureus_playwright_test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php-versions: ["8.3"]
        node-version: ["22.13.1"]
        shard-index: [1, 2, 3, 4, 5, 6]
        shard-total: [6]

    name: Playwright Tests | Shard ${{ matrix.shard-index }} Of ${{ matrix.shard-total }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aureuserp
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Node.js Dependencies
        run: npm install
        working-directory: .

      - name: Install Playwright Browsers
        run: |
          sudo apt-get update --allow-releaseinfo-change
          npx playwright install --with-deps chromium
        working-directory: tests/e2e-pw

      - name: Setup Environment File
        run: |
          cp .env.example .env
          sed -i "s|^#\?DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env
          sed -i "s|^#\?DB_HOST=.*|DB_HOST=127.0.0.1|" .env
          sed -i "s|^#\?DB_PORT=.*|DB_PORT=${{ job.services.mysql.ports['3306'] }}|" .env
          sed -i "s|^#\?DB_DATABASE=.*|DB_DATABASE=aureuserp|" .env
          sed -i "s|^#\?DB_USERNAME=.*|DB_USERNAME=root|" .env
          sed -i "s|^#\?DB_PASSWORD=.*|DB_PASSWORD=root|" .env
          sed -i "s|^#\?APP_DEBUG=.*|APP_DEBUG=false|" .env
          sed -i "s|^#\?APP_URL=.*|APP_URL=http://127.0.0.1:8000|" .env
          cat .env

      - name: Install Composer Dependencies
        run: composer create-project

      - name: Seed the tables
        run: php artisan db:seed
          
      - name: Install Aureus ERP
        run: php artisan erp:install

      - name: Build Assets (Vite - Filament)
        run: npm run build
        working-directory: .

      - name: Start Laravel Server
        run: |
          php artisan serve --host=0.0.0.0 --port=8000 > server.log 2>&1 &
          echo "Waiting for Laravel server to start..."
          timeout 30 bash -c 'until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 1; done'

      - name: Run All Playwright Tests
        env:
          BASE_URL: "http://127.0.0.1:8000"
        run: |
          npx playwright test --reporter=list --config=tests/e2e-pw/playwright.config.ts --shard=${{ matrix.shard-index }}/${{ matrix.shard-total }}
        working-directory: tests/e2e-pw

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.shard-index }}-${{ github.run_id }}-${{ github.run_number }}
          path: |
            tests/e2e-pw/test-results
            storage/logs/laravel.log
          retention-days: 1
