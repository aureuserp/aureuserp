trigger:
  - main
  - workflow-*

pool:
  vmImage: "ubuntu-latest"

variables:
  phpVersion: "8.2"
  composerVersion: "2"
  nodeVersion: "18.x"

stages:
  - stage: Build
    jobs:
      - job: BuildAndTest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: "Install Node.js"

          # Install PHP using shell script
          - script: |
              sudo add-apt-repository ppa:ondrej/php
              sudo apt-get update
              sudo apt-get install -y php$(phpVersion)-cli php$(phpVersion)-curl php$(phpVersion)-mbstring php$(phpVersion)-xml php$(phpVersion)-bcmath php$(phpVersion)-mysql php$(phpVersion)-gd
            displayName: "Install PHP"

          - script: |
              php -v
              composer -V
            displayName: "Check versions"

          - script: |
              composer install --no-interaction --prefer-dist --optimize-autoloader
            displayName: "Install Composer Dependencies"

          - script: |
              cp .env.example .env
              php artisan key:generate
            displayName: "Configure Laravel"

          - script: |
              npm ci
              npm run build
            displayName: "Install & Build Frontend"

          - script: |
              php artisan erp:install --admin-name="CI User" --admin-email="ci@example.com" --admin-password="Secret123!"
            displayName: "Run ERP Installer"

          - script: |
              php artisan test
            displayName: "Run Tests"

          - script: |
              npx playwright install --with-deps
              npx playwright test
            displayName: "Run Playwright Tests"
            env:
              PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000

  - stage: Deploy
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployToProduction
        steps:
          - script: echo "Add your deployment steps here"
            displayName: "Deploy"
